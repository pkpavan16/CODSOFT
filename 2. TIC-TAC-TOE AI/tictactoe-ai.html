<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic-Tac-Toe AI Agent</title>
  <style>
    @font-face {
      font-family: 'DM Sans';
      font-style: normal;
      font-weight: 300 500;
      font-display: swap;
      src: url(https://fonts.gstatic.com/s/dmsans/v17/rP2Yp2ywxg089UriI5-g4vlH9VoD8Cmcqbu0-K6z9mXg.woff2) format('woff2');
      unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
    }

    @font-face {
      font-family: 'DM Sans';
      font-style: italic;
      font-weight: 300;
      font-display: swap;
      src: url(https://fonts.gstatic.com/s/dmsans/v17/rP2rp2ywxg089UriCZaSExd86J3t9jz86Mvy4qCRAL19DksVat_XDV30TGcro9o45zw.woff2) format('woff2');
      unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
    }

    @font-face {
      font-family: 'Syne';
      font-style: normal;
      font-weight: 400 800;
      font-display: swap;
      src: url(https://fonts.gstatic.com/s/syne/v24/8vIH7w4qzmVxm2BL9G78HEY.woff2) format('woff2');
      unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      padding: 24px;
      background: #0f172a;
      color: #f8fafc;
      font-family: 'DM Sans', Arial, sans-serif;
    }

    main {
      width: min(100%, 980px);
      margin: 0 auto;
    }

    header {
      margin-bottom: 20px;
      text-align: center;
    }

    h1 {
      margin-bottom: 8px;
      font-family: 'Syne', 'DM Sans', Arial, sans-serif;
      font-size: clamp(32px, 6vw, 56px);
      font-weight: 800;
    }

    p {
      color: #cbd5e1;
      line-height: 1.5;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(280px, 420px) 1fr;
      gap: 18px;
      align-items: start;
    }

    .panel {
      border: 1px solid #334155;
      border-radius: 8px;
      background: #111827;
      padding: 16px;
    }

    .scoreboard {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }

    .score {
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 12px 8px;
      background: #1e293b;
      text-align: center;
    }

    .score span {
      display: block;
      margin-bottom: 4px;
      color: #94a3b8;
      font-size: 13px;
    }

    .score strong {
      font-family: 'Syne', 'DM Sans', Arial, sans-serif;
      font-size: 30px;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .cell {
      aspect-ratio: 1;
      border: 2px solid #334155;
      border-radius: 8px;
      background: #1f2937;
      color: #f9fafb;
      font-family: 'Syne', 'DM Sans', Arial, sans-serif;
      font-size: clamp(42px, 11vw, 64px);
      font-weight: 800;
      cursor: pointer;
      transition: 0.15s ease;
    }

    .cell:hover:empty {
      background: #263449;
      border-color: #64748b;
    }

    .cell.x {
      color: #60a5fa;
    }

    .cell.o {
      color: #fb7185;
    }

    .cell.win {
      background: #14532d;
      border-color: #22c55e;
    }

    .status {
      min-height: 30px;
      margin: 16px 0;
      font-size: 20px;
      font-weight: 800;
      text-align: center;
    }

    .controls,
    .starter {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .starter {
      margin-bottom: 14px;
    }

    button {
      border: 0;
      border-radius: 8px;
      padding: 11px 16px;
      background: #2563eb;
      color: white;
      font-family: 'DM Sans', Arial, sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    button.secondary {
      border: 1px solid #334155;
      background: #1e293b;
      color: #e2e8f0;
    }

    button.secondary:hover,
    button.selected {
      background: #334155;
    }

    .side h2 {
      margin-bottom: 10px;
      font-family: 'Syne', 'DM Sans', Arial, sans-serif;
      font-size: 22px;
    }

    .agent-box {
      display: grid;
      gap: 10px;
      margin-bottom: 16px;
    }

    .agent-item {
      border-left: 3px solid #38bdf8;
      padding: 10px 12px;
      background: #0f172a;
      color: #cbd5e1;
      line-height: 1.45;
    }

    .agent-item strong {
      color: #f8fafc;
    }

    .history {
      display: grid;
      gap: 8px;
      max-height: 240px;
      overflow: auto;
    }

    .move {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 9px 10px;
      background: #0f172a;
      color: #cbd5e1;
      font-size: 14px;
    }

    .move strong {
      color: #f8fafc;
    }

    .note {
      margin-top: 16px;
      color: #94a3b8;
      font-size: 14px;
      text-align: center;
    }

    @media (max-width: 800px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Tic-Tac-Toe AI Agent</h1>
    </header>

    <div class="layout">
      <section class="panel">
        <div class="scoreboard">
          <div class="score">
            <span>You</span>
            <strong id="humanScore">0</strong>
          </div>
          <div class="score">
            <span>Draws</span>
            <strong id="drawScore">0</strong>
          </div>
          <div class="score">
            <span>AI</span>
            <strong id="aiScore">0</strong>
          </div>
        </div>

        <div class="starter" aria-label="Choose starter">
          <button class="secondary selected" id="humanFirstBtn" type="button" onclick="setStarter('human')">You First</button>
          <button class="secondary" id="aiFirstBtn" type="button" onclick="setStarter('ai')">AI First</button>
        </div>

        <div class="board" id="board">
          <button class="cell" data-index="0" aria-label="Cell 1"></button>
          <button class="cell" data-index="1" aria-label="Cell 2"></button>
          <button class="cell" data-index="2" aria-label="Cell 3"></button>
          <button class="cell" data-index="3" aria-label="Cell 4"></button>
          <button class="cell" data-index="4" aria-label="Cell 5"></button>
          <button class="cell" data-index="5" aria-label="Cell 6"></button>
          <button class="cell" data-index="6" aria-label="Cell 7"></button>
          <button class="cell" data-index="7" aria-label="Cell 8"></button>
          <button class="cell" data-index="8" aria-label="Cell 9"></button>
        </div>

        <div class="status" id="status">Your turn</div>

        <div class="controls">
          <button type="button" onclick="resetGame()">New Round</button>
          <button class="secondary" type="button" onclick="resetScores()">Reset Scores</button>
        </div>
      </section>

      <aside class="panel side">
        <h2>AI Agent Details</h2>
        <div class="agent-box">
          <div class="agent-item"><strong>Algorithm:</strong> Minimax with Alpha-Beta Pruning</div>
          <div class="agent-item"><strong>Goal:</strong> maximize O score and block X wins</div>
          <div class="agent-item" id="aiInfo"><strong>Last AI move:</strong> waiting for game</div>
        </div>

        <h2>Move History</h2>
        <div class="history" id="history">
          <div class="move"><span>No moves yet</span><strong>Start</strong></div>
        </div>
      </aside>
    </div>

  </main>

  <script>
    const cells = document.querySelectorAll(".cell");
    const statusText = document.getElementById("status");
    const historyBox = document.getElementById("history");
    const aiInfo = document.getElementById("aiInfo");
    const scoreEls = {
      human: document.getElementById("humanScore"),
      ai: document.getElementById("aiScore"),
      draw: document.getElementById("drawScore"),
    };
    const winLines = [
      [0, 1, 2],
      [3, 4, 5],
      [6, 7, 8],
      [0, 3, 6],
      [1, 4, 7],
      [2, 5, 8],
      [0, 4, 8],
      [2, 4, 6],
    ];

    let board = Array(9).fill("");
    let gameOver = false;
    let waitingForAI = false;
    let starter = "human";
    let scores = { human: 0, ai: 0, draw: 0 };
    let moves = [];

    function checkWinner(currentBoard) {
      for (const line of winLines) {
        const [a, b, c] = line;
        if (currentBoard[a] && currentBoard[a] === currentBoard[b] && currentBoard[a] === currentBoard[c]) {
          return { winner: currentBoard[a], line };
        }
      }

      if (currentBoard.every(Boolean)) {
        return { winner: "tie", line: [] };
      }

      return null;
    }

    function positionName(index) {
      return `Cell ${index + 1}`;
    }

    function addMove(player, index, score) {
      const scoreText = score === undefined ? "" : ` | score ${score}`;
      moves.push({ player, text: `${player} played ${positionName(index)}${scoreText}` });
      renderHistory();
    }

    function renderHistory() {
      if (moves.length === 0) {
        historyBox.innerHTML = '<div class="move"><span>No moves yet</span><strong>Start</strong></div>';
        return;
      }

      historyBox.innerHTML = moves.map((move, index) => (
        `<div class="move"><span>${move.text}</span><strong>#${index + 1}</strong></div>`
      )).join("");
    }

    function render(result) {
      cells.forEach((cell, index) => {
        cell.textContent = board[index];
        cell.className = "cell";
        cell.disabled = gameOver || waitingForAI || Boolean(board[index]);

        if (board[index] === "X") {
          cell.classList.add("x");
        }

        if (board[index] === "O") {
          cell.classList.add("o");
        }
      });

      if (result && result.line) {
        result.line.forEach((index) => cells[index].classList.add("win"));
      }
    }

    function updateScores() {
      scoreEls.human.textContent = scores.human;
      scoreEls.ai.textContent = scores.ai;
      scoreEls.draw.textContent = scores.draw;
    }

    function finishGame(result) {
      gameOver = true;

      if (result.winner === "X") {
        scores.human++;
        statusText.textContent = "You win!";
      } else if (result.winner === "O") {
        scores.ai++;
        statusText.textContent = "AI wins!";
      } else {
        scores.draw++;
        statusText.textContent = "Draw!";
      }

      updateScores();
      render(result);
    }

    async function askPythonAI() {
      waitingForAI = true;
      statusText.textContent = "Python AI is thinking...";
      render();

      const response = await fetch("/ai-move", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ board }),
      });

      const data = await response.json();

      if (data.error) {
        statusText.textContent = data.error;
        waitingForAI = false;
        render();
        return;
      }

      board = data.board;
      waitingForAI = false;

      if (data.move !== null) {
        addMove("AI", data.move, data.score);
        aiInfo.innerHTML = `<strong>Last AI move:</strong> ${positionName(data.move)} with Minimax score ${data.score}`;
      }

      if (data.result) {
        finishGame(data.result);
      } else {
        statusText.textContent = "Your turn";
        render();
      }
    }

    function playMove(index) {
      if (gameOver || waitingForAI || board[index]) {
        return;
      }

      board[index] = "X";
      addMove("You", index);
      render();

      const result = checkWinner(board);
      if (result) {
        finishGame(result);
        return;
      }

      askPythonAI();
    }

    function setStarter(value) {
      starter = value;
      document.getElementById("humanFirstBtn").classList.toggle("selected", starter === "human");
      document.getElementById("aiFirstBtn").classList.toggle("selected", starter === "ai");
      resetGame();
    }

    function resetGame() {
      board = Array(9).fill("");
      gameOver = false;
      waitingForAI = false;
      moves = [];
      aiInfo.innerHTML = "<strong>Last AI move:</strong> waiting for game";
      renderHistory();
      render();

      if (starter === "ai") {
        askPythonAI();
      } else {
        statusText.textContent = "Your turn";
      }
    }

    function resetScores() {
      scores = { human: 0, ai: 0, draw: 0 };
      updateScores();
      resetGame();
    }

    cells.forEach((cell) => {
      cell.addEventListener("click", () => playMove(Number(cell.dataset.index)));
    });

    updateScores();
    resetGame();
  </script>
</body>
</html>
