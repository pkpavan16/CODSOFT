<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ app_name }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <main class="app-shell">
    <section class="chat-panel" aria-label="Chatbot">
      <header class="chat-header">
        <div>
          <h1>IntelliBot</h1>
          <p>Rule-based chatbot with context, confidence, and analytics</p>
        </div>
        <span class="status">Online</span>
      </header>

      <div id="chatMessages" class="chat-messages" aria-live="polite">
        <article class="message bot">
          <p>Hello! Ask me about programming, jokes, math, time, or tell me your name.</p>
          <span class="meta">Confidence: 100%</span>
        </article>
      </div>

      <form id="chatForm" class="chat-form">
        <input id="messageInput" type="text" autocomplete="off" placeholder="Type your message..." aria-label="Type your message">
        <button type="submit">Send</button>
      </form>
    </section>
  </main>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
